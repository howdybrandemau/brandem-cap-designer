<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Brandem Cap Designer</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans','Segoe UI',system-ui,sans-serif;background:#F4F3EC;color:#47360B;height:100dvh;overflow:hidden;display:flex;flex-direction:column;margin:0}
button{cursor:pointer;font-family:inherit;transition:all .15s}
input,select,textarea{font-family:inherit}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
/* HEADER */
#header{background:#FCD68A;border-bottom:1.5px solid #C8A830;padding:8px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;box-shadow:0 1px 12px rgba(71,54,11,.08);z-index:50}
#logo-img{width:44px;height:44px;object-fit:contain}
.hdr-site{font-family:'Black Han Sans',sans-serif;font-size:16px;color:#47360B;letter-spacing:.5px;line-height:1;text-transform:uppercase}
.hdr-sub{font-family:'Black Han Sans',sans-serif;font-size:11px;color:#9A8A6A;letter-spacing:1px;line-height:1.5;text-transform:uppercase}
#order-btn{background:#F74D24;border-radius:8px;padding:8px 20px;font-size:12px;font-weight:700;color:#fff;border:none;margin-left:auto;font-family:'Black Han Sans',sans-serif;letter-spacing:1px;box-shadow:0 3px 10px rgba(247,77,36,.33)}
#order-btn:hover{opacity:.9;transform:translateY(-1px)}
/* BODY */
#body{flex:1;display:flex;flex-direction:row;overflow:hidden;min-height:0}
/* SIDEBAR */
#sidebar{width:300px;flex-shrink:0;border-right:2px solid #C8A830;border-top:none;background:#FCD68A;display:flex;flex-direction:column;overflow:hidden}
#tabs{display:flex;border-bottom:2px solid #C8A830;flex-shrink:0;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
.tab-btn{flex:1;padding:8px 6px;border:none;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;line-height:1.4;background:transparent;color:#7A6030;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;min-width:56px}
.tab-btn.active{background:rgba(255,255,255,0.5);color:#47360B;border-bottom:2px solid #47360B}
.tab-btn .tab-icon{font-size:16px;display:block;margin-bottom:1px}
#panel{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:6px}
/* CANVAS */
#canvas-area{flex:1;display:flex;flex-direction:column;background:#E8E6DC;overflow:hidden;min-height:0;min-width:0}
.dot-grid{position:fixed;inset:0;background-image:radial-gradient(circle,rgba(71,54,11,.08) 1px,transparent 1px);background-size:24px 24px;pointer-events:none;z-index:0}
#zoom-scroller{flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:flex-start;padding:24px;min-height:0;min-width:0}
#zoom-stage{display:inline-flex;align-items:center;justify-content:center;transform-origin:top left}
#whiteboard{position:relative;background:#fff;border-radius:16px;box-shadow:0 8px 48px rgba(71,54,11,.18),0 2px 12px rgba(71,54,11,.10);overflow:visible;aspect-ratio:2/1;width:min(calc(100vw - 348px), calc((100vh - 120px) * 2));flex-shrink:0}
#cap-svg-wrap{position:absolute;inset:0}
#cap-svg-wrap svg{width:100%;height:100%;display:block}
#canvas-items{position:absolute;inset:0;overflow:visible}
#hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
#hint-inner{background:rgba(255,255,255,.85);border-radius:10px;padding:10px 18px;font-size:12px;color:#9A8A6A;border:1px dashed #D4CFC0;backdrop-filter:blur(4px)}
/* COLOUR PICKER MODAL */
#picker-modal{position:fixed;inset:0;background:rgba(71,54,11,.55);display:flex;align-items:flex-end;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
#picker-sheet{background:#F4F3EC;border-radius:22px 22px 0 0;padding:16px 16px 40px;width:100%;max-width:520px;max-height:80vh;display:flex;flex-direction:column;gap:10px;box-shadow:0 -24px 80px rgba(71,54,11,.25)}
#picker-handle{width:36px;height:4px;background:#D4CFC0;border-radius:2px;margin:0 auto}
#picker-header{display:flex;justify-content:space-between;align-items:center;padding:4px 2px}
#picker-swatch{width:40px;height:40px;border-radius:50%;border:3px solid #C08B3D;box-shadow:0 2px 10px rgba(0,0,0,.15);flex-shrink:0}
#picker-search{background:#EAE9E1;border:1.5px solid #D4CFC0;border-radius:10px;padding:10px 14px;color:#47360B;font-size:15px;outline:none}
#picker-search:focus{border-color:#C08B3D}
#picker-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:4px;overflow-y:auto}
.colour-swatch{width:100%;aspect-ratio:1;border-radius:7px;border:none;cursor:pointer;transition:transform .12s;outline:1.5px solid rgba(0,0,0,.08);outline-offset:1px}
.colour-swatch:hover{transform:scale(1.18)}
.colour-swatch.selected{outline:3px solid #F74D24}
/* PART ROWS */
.part-row{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.7);border-radius:10px;padding:8px 10px;cursor:pointer;border:1.5px solid rgba(0,0,0,.1);transition:all .15s}
.part-row:hover{border-color:#47360B;background:rgba(255,255,255,0.9)}
.part-swatch{width:36px;height:36px;border-radius:9px;flex-shrink:0;border:1.5px solid #D4CFC0;box-shadow:0 2px 6px rgba(0,0,0,.12)}
.part-label{font-weight:700;font-size:12px;color:#47360B}
.part-color-name{color:#9A8A6A;font-size:10px;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.part-arrow{font-size:11px;color:#C08B3D;font-weight:700;flex-shrink:0;margin-left:auto}
/* FORM ELEMENTS */
.field-label{font-size:10px;color:#7A6030;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.text-input{background:rgba(255,255,255,0.8);border:1.5px solid rgba(0,0,0,.15);border-radius:8px;padding:9px 10px;color:#47360B;font-size:14px;outline:none;width:100%}
.text-input:focus{border-color:#C08B3D}
.btn-primary{padding:10px;background:#F74D24;border:none;border-radius:8px;color:#fff;font-weight:700;font-size:13px;width:100%;box-shadow:0 3px 10px rgba(247,77,36,.33)}
.btn-primary:hover{opacity:.9}
.btn-primary:disabled{background:#DEDAD0;color:#9A8A6A;box-shadow:none;cursor:not-allowed}
.btn-secondary{padding:8px 14px;border-radius:8px;border:1.5px solid #D4CFC0;background:#fff;color:#9A8A6A;font-size:13px;font-weight:600}
.btn-secondary.active{border-color:#C08B3D;background:#C08B3D;color:#fff}
/* DRAG ITEMS */
.drag-item{position:absolute;cursor:grab;user-select:none;touch-action:none;z-index:10}
.drag-item.selected{z-index:20}
.drag-content{position:relative;outline:2px dashed transparent;outline-offset:3px;border-radius:4px;padding:1px}
.drag-item.selected .drag-content{outline-color:rgba(247,77,36,.85)}
.drag-delete{position:absolute;top:-12px;right:-12px;background:#F74D24;border:2px solid #fff;color:#fff;border-radius:50%;width:22px;height:22px;font-size:11px;cursor:pointer;font-weight:bold;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.3);z-index:30;border:none}
.item-toolbar{position:absolute;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:4px;background:rgba(28,22,8,.93);backdrop-filter:blur(10px);border-radius:12px;padding:5px 8px;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4);z-index:9999;border:1px solid rgba(255,255,255,.08);pointer-events:auto}
.tb-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#ccc;cursor:pointer;font-size:15px;line-height:1;padding:3px 7px;border-radius:6px;font-weight:700}
.tb-btn:hover{background:rgba(255,255,255,.15)}
.tb-size{color:#FCD68A;font-size:10px;min-width:30px;text-align:center;font-weight:700}
.tb-div{width:1px;height:18px;background:rgba(255,255,255,.12);margin:0 1px}
.tb-shape{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#bbb;cursor:pointer;border-radius:6px;padding:3px 6px;display:flex;align-items:center}
.tb-shape.active{background:rgba(192,139,61,.85);border-color:rgba(192,139,61,.6);color:#fff}
/* COLOR PREVIEW STRIP */
.colour-preview-strip{background:#fff;border-radius:12px;padding:10px 12px;border:1.5px solid #D4CFC0;margin-bottom:4px}
.strip-label{font-size:9px;color:#9A8A6A;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.strip-swatches{display:flex;gap:4px;flex-wrap:wrap}
.strip-dot{width:28px;height:28px;border-radius:6px;border:1.5px solid #D4CFC0;cursor:pointer;transition:transform .1s;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.strip-dot:hover{transform:scale(1.15)}
/* ORDER SUMMARY */
.summary-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #EAE9E1}
.summary-dot{width:12px;height:12px;border-radius:3px}
/* SHAPE BUTTONS */
.shape-btn{flex:1;padding:8px 4px;border-radius:10px;cursor:pointer;border:2px solid #D4CFC0;background:#fff;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .15s}
.shape-btn.active{border-color:#C08B3D;background:rgba(192,139,61,.1)}
.shape-btn span{font-size:9px;color:#9A8A6A;font-weight:600}
.shape-btn.active span{color:#C08B3D}
/* TEXT LIST */
.text-list-item{background:#fff;border-radius:8px;padding:7px 10px;display:flex;justify-content:space-between;align-items:center;border:1.5px solid #D4CFC0;margin-bottom:4px}
.text-list-del{background:#F74D24;border:none;color:#fff;border-radius:5px;padding:3px 8px;cursor:pointer;font-size:10px;font-weight:700;flex-shrink:0}
/* LOGO UPLOAD */
.upload-zone{background:#fff;border-radius:10px;padding:20px;border:2px dashed #D4CFC0;text-align:center;cursor:pointer;transition:border-color .15s}
.upload-zone:hover{border-color:#C08B3D}
/* UNDERBRIM PANEL */
.underbrim-drop{border:2px dashed #D4CFC0;border-radius:14px;padding:24px 16px;text-align:center;cursor:pointer;transition:all .15s;background:#fff;position:relative}
.underbrim-drop:hover,.underbrim-drop.drag-over{border-color:#C08B3D;background:#FFF8EE}
.underbrim-drop input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.underbrim-preview{width:100%;border-radius:10px;margin-top:10px;border:1.5px solid #D4CFC0;max-height:100px;object-fit:cover}
/* ZOOM CONTROLS */
.panel-drag-handle{width:100%;display:flex;justify-content:center;align-items:center;padding:5px 0 3px;cursor:ns-resize;flex-shrink:0;background:#FCD68A;user-select:none;touch-action:none}
.panel-drag-pill{width:36px;height:4px;background:rgba(71,54,11,.3);border-radius:2px;transition:background .15s}
.panel-drag-handle:hover .panel-drag-pill{background:rgba(71,54,11,.6)}
.zoom-controls{position:fixed;bottom:16px;right:16px;display:flex;align-items:center;gap:6px;background:rgba(244,243,236,.95);border-radius:10px;padding:5px 10px;border:1.5px solid #D4CFC0;box-shadow:0 2px 12px rgba(71,54,11,.18);z-index:200}
.zoom-btn{background:#EAE9E1;border:1.5px solid #D4CFC0;border-radius:6px;color:#47360B;font-size:16px;font-weight:700;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.zoom-btn:hover{background:#D4CFC0}
.zoom-label{font-size:10px;color:#9A8A6A;font-weight:700;min-width:34px;text-align:center}
/* SUCCESS */
.success-box{text-align:center;padding:32px 8px}
/* SECTION LABEL */
.section-label{font-size:10px;color:#7A6030;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px;margin-top:2px}
/* INFO BOX */
.info-box{background:#DEDAD0;border-radius:8px;padding:8px 10px;border:1px solid #D4CFC0;font-size:11px;color:#9A8A6A;line-height:1.6}
@media(max-width:700px){
  #body{flex-direction:column}
  #sidebar{width:100%;height:220px;border-right:none;border-top:2px solid #C8A830;order:2}
  #canvas-area{order:1;flex:1}
  #whiteboard{width:min(calc(100vw - 32px), calc((55vh) * 2))}
}
</style>
</head>

let _renderingCap = false;
function renderCap() {

function changeZoom(dir) {
  const steps = [0.25, 0.33, 0.5, 0.67, 0.75, 1, 1.25, 1.5, 2, 3];
  const cur = steps.findIndex(s => Math.abs(s - state.zoom) < 0.01);
  const next = Math.max(0, Math.min(steps.length-1, (cur === -1 ? 5 : cur) + dir));
  state.zoom = steps[next];
  applyZoom();
}

function applyZoom() {
  const stage = document.getElementById('zoom-stage');
  const scroller = document.getElementById('zoom-scroller');
  if (!stage) return;
  const z = state.zoom;
  stage.style.transform = 'scale(' + z + ')';
  stage.style.transformOrigin = 'top left';
  // Expand stage so scroller gets scrollbars when zoomed
  const wb = document.getElementById('whiteboard');
  if (wb && scroller) {
    const natW = wb.offsetWidth;
    const natH = wb.offsetHeight;
    stage.style.width  = (natW * z + 48) + 'px';
    stage.style.height = (natH * z + 48) + 'px';
  }
  const zl = document.getElementById('zoom-label'); if (zl) zl.textContent = Math.round(z*100) + '%';
}

function colourName(hex) {
  const c = COLOURS.find(c => c.hex.toLowerCase() === hex.toLowerCase());
  return c ? c.name : hex;
}

// ── COLOUR PICKER ─────────────────────────────────────────────────────────────
let pickerPartId = null;

function openPicker(partId) {
  pickerPartId = partId;
  const part = CAP_PARTS.find(p => p.id === partId);
  const pt = document.getElementById('picker-title'); if(pt) pt.textContent = part.label;
  document.getElementById('picker-swatch').style.background = state.colours[partId];
  document.getElementById('picker-search').value = '';
  document.getElementById('picker-modal').style.display = 'flex';
  renderPickerGrid();
}

function closePicker() {
  document.getElementById('picker-modal').style.display = 'none';
  pickerPartId = null;
}

function renderPickerGrid() {
  const q = document.getElementById('picker-search').value.toLowerCase();
  const list = COLOURS.filter(c => c.name.toLowerCase().includes(q) || c.hex.includes(q));
  const cur = pickerPartId ? state.colours[pickerPartId] : '';
  document.getElementById('picker-grid').innerHTML = list.map(c => `
    <button class="colour-swatch${c.hex.toLowerCase()===cur.toLowerCase()?' selected':''}"
      style="background:${c.hex};${c.hex==='#ffffff'?'box-shadow:inset 0 0 0 1px #ccc':''}"
      title="${c.name}" onclick="pickColour('${c.hex}')"></button>
  `).join('');
  const pc = document.getElementById('picker-count'); if(pc) pc.textContent = list.length + ' colours';
}

function pickColour(hex) {
  if (!pickerPartId) return;
  state.colours[pickerPartId] = hex;
  renderCap();
  renderPanel();
  closePicker();
}

function switchTab(tab) {

// ── PANEL ─────────────────────────────────────────────────────────────────────
function updateHeaderTotal() {
  const el = document.getElementById('hdr-total');
  if (!el) return;
  const qty = parseInt(state.form.qty) || 0;
  const TIERS = [
    {min:25,max:49,price:30},{min:50,max:99,price:22},
    {min:100,max:199,price:18},{min:200,max:499,price:16},{min:500,max:Infinity,price:14}
  ];
  const tier = TIERS.find(t => qty >= t.min && qty <= t.max);
  if (!tier || qty < 25 || qty % 25 !== 0) { el.innerHTML = ''; return; }
  const sideTags = Math.min(5, parseInt(state.form.sideTags) || 0);
  const wantUnderbrim = !!state.form.wantUnderbrim;
  const textCount = state.items.filter(i=>i.type==='text').length;
  const extra = sideTags * 0.5 + (wantUnderbrim ? 1 : 0) + textCount * 0.5;
  const total = (tier.price + extra) * qty;
  el.innerHTML = `<div style="text-align:center;line-height:1.3">
    <div style="font-size:10px;color:#7A6030;font-weight:600;letter-spacing:.5px">${qty} HATS · $${tier.price}/HAT${extra>0?' + EXTRAS':''}</div>
    <div style="font-size:18px;font-weight:800;color:#47360B;font-family:'Black Han Sans',sans-serif">$${total.toFixed(2)}</div>
  </div>`;
}

function renderPanel() {
  updateHeaderTotal();
  const panel = document.getElementById('panel');
  if (state.tab === 'colours') panel.innerHTML = renderColoursPanel();
  else if (state.tab === 'text') panel.innerHTML = renderTextPanel();
  else if (state.tab === 'logo') panel.innerHTML = renderLogoPanel();
  else if (state.tab === 'underbrim') panel.innerHTML = renderUnderbrimPanel();
  else if (state.tab === 'order') panel.innerHTML = renderOrderPanel();
  bindPanelEvents();
}

function escHtml(s) {

}

function setShape(v) {

function addText() {
  const text = state.newText.trim();
  if (!text) return;
  const existing = state.items.filter(i=>i.type==='text');
  const y = existing.length > 0 ? 55 + existing.length * 40 : 55;
  state.items.push({
    id: state.nextId++, type:'text', text,
    font: state.font, size: state.tSize, color: state.tColor,
    bold: state.bold, italic: state.italic, curve: state.tCurve,
    textBg: state.tBg || 'none',
    x: 60, y
  });
  state.newText = '';
  state.selId = null; // clear selection so editor doesn't block the add form
  renderCanvas();

  setTimeout(() => {

function getCompositeSVGString() {
  // ── 1. Get the cap SVG ────────────────────────────────────────────────────
  const capSvg = document.querySelector('#cap-svg-wrap svg');
  if (!capSvg) return null;

  // viewBox is "10 50 260 130"
  const VX = 10, VY = 50, VW = 260, VH = 130;

  // ── 2. Get the whiteboard pixel dimensions ────────────────────────────────
  const wb = document.getElementById('whiteboard');
  if (!wb) return null;
  const wbW = wb.offsetWidth  || 520;
  const wbH = wb.offsetHeight || 260;

  // ── 3. Scale factor: pixels → SVG units ──────────────────────────────────
  const scaleX = VW / wbW;
  const scaleY = VH / wbH;

  // ── 4. Build text/logo SVG elements ──────────────────────────────────────
  const zoom = state.zoom || 1;
  let overlayNodes = '';
  state.items.forEach(item => {
    // item.x/y are pixel positions within the whiteboard at zoom=1
    const sx = VX + item.x * scaleX;
    const sy = VY + item.y * scaleY;

    if (item.type === 'text') {
      const fw = item.bold ? 'bold' : 'normal';
      const fs = item.italic ? 'italic' : 'normal';
      const svgFontSize = item.size * scaleY;
      const hasBg = item.textBg && item.textBg !== 'none';
      const pad = svgFontSize * 0.3;
      const rx = Math.min(pad, 4);

      if (hasBg) {
        // Estimate text width (rough)
        const estW = item.text.length * svgFontSize * 0.55 + pad * 2;
        const estH = svgFontSize + pad * 2;
        overlayNodes += `<rect x="${(sx - pad).toFixed(2)}" y="${(sy - svgFontSize - pad).toFixed(2)}" width="${estW.toFixed(2)}" height="${estH.toFixed(2)}" rx="${rx}" fill="${item.textBg}"/>`;
      }
      overlayNodes += `<text x="${sx.toFixed(2)}" y="${sy.toFixed(2)}" font-family="${item.font}, sans-serif" font-size="${svgFontSize.toFixed(2)}" fill="${item.color}" font-weight="${fw}" font-style="${fs}" dominant-baseline="auto">${item.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</text>`;

    } else if (item.type === 'logo') {
      const svgW = item.size * scaleX;
      const svgH = item.size * scaleY;
      overlayNodes += `<image href="${item.src}" x="${sx.toFixed(2)}" y="${sy.toFixed(2)}" width="${svgW.toFixed(2)}" height="${svgH.toFixed(2)}" preserveAspectRatio="xMidYMid meet"/>`;
    }
  });

  // ── 5. Inline CSS vars as actual colours ──────────────────────────────────
  let capInner = new XMLSerializer().serializeToString(capSvg);
  CAP_PARTS.forEach(p => {
    const colour = state.colours[p.id];
    const re = new RegExp('var\(' + p.cssVar.replace(/[-]/g,'\-') + '\)', 'g');
    capInner = capInner.replace(re, colour);
  });
  // Strip outer <svg> wrapper — we'll wrap in our own
  capInner = capInner.replace(/<svg[^>]*>/, '').replace(/<\/svg>$/, '');

  // ── 6. Compose final SVG ──────────────────────────────────────────────────
  const out = `<svg viewBox="${VX} ${VY} ${VW} ${VH}" width="1040" height="520" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
${capInner}
<g id="overlay">${overlayNodes}</g>
</svg>`;

  return out;
}

function downloadSVGTest() {
  const svgStr = getCompositeSVGString();
  if (!svgStr) { alert('No design to download yet!'); return; }
  const blob = new Blob([svgStr], {type:'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'brandem-cap-design.svg';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function getSVGDataURL() {
  const svgStr = getCompositeSVGString();
  if (!svgStr) return null;
  return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgStr)));
}

function submitOrder() {
  const cl = CAP_PARTS.map(p=>`${p.label}: ${colourName(state.colours[p.id])} (${state.colours[p.id]})`).join('\n');
  const tl = state.items.filter(i=>i.type==='text').map(i=>`"${i.text}" | ${i.font} | ${i.size}px | ${i.color}`).join('\n') || 'None';
  const ll = state.items.filter(i=>i.type==='logo').length;
  const f = state.form;
  const sideTags = parseInt(state.form.sideTags) || 0;
  const wantUnderbrim = !!state.form.wantUnderbrim;
  const textCount = state.items.filter(i=>i.type==='text').length;

  // Pricing
  const TIERS = [{min:25,max:49,price:30},{min:50,max:99,price:22},{min:100,max:199,price:18},{min:200,max:499,price:16},{min:500,max:Infinity,price:14}];
  const qty = parseInt(f.qty) || 0;
  const tier = TIERS.find(t => qty >= t.min && qty <= t.max);
  const extraPerHat = (sideTags*0.5) + (wantUnderbrim?1:0) + (textCount*0.5);
  const totalOrder = tier ? (tier.price + extraPerHat) * qty : null;

  const extras = [
    textCount > 0 ? `+ Text embroidery: ${textCount} × $0.50/hat` : null,
    sideTags > 0 ? `+ Side embroidery tags: ${sideTags} × $0.50/hat` : null,
    wantUnderbrim ? '+ Underbrim photo print: $1.00/hat' : null,
  ].filter(Boolean).join('\n') || 'None';

  const svgDataUrl = getSVGDataURL();

  // Show sending state
  state.sending = true;
  renderPanel();

  // ── EmailJS send ──────────────────────────────────────────────────────────
  // SETUP: replace YOUR_PUBLIC_KEY, YOUR_SERVICE_ID, YOUR_TEMPLATE_ID
  // with values from emailjs.com dashboard
  const EMAILJS_PUBLIC_KEY  = 'YOUR_PUBLIC_KEY';
  const EMAILJS_SERVICE_ID  = 'YOUR_SERVICE_ID';
  const EMAILJS_TEMPLATE_ID = 'YOUR_TEMPLATE_ID';

  emailjs.init(EMAILJS_PUBLIC_KEY);
  emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
    customer_name:  f.name,
    customer_email: f.email,
    customer_phone: f.phone || '—',
    quantity:       f.qty || '—',
    notes:          f.notes || '—',
    colours:        cl,
    text_elements:  tl,
    logos:          ll + ' logo(s)',
    extras:         extras,
    total:          totalOrder ? '$' + totalOrder.toFixed(2) : '—',
    svg_data:       svgDataUrl || '',
    to_email:       'howdy@brandemau.com',
  }).then(() => {
    state.sending = false;
    state.sent = true;
    renderPanel();
  }).catch(err => {
    state.sending = false;
    alert('Something went wrong sending your order. Please email howdy@brandemau.com directly.\n\nError: ' + JSON.stringify(err));
    renderPanel();
  });
}

function makeCurvedTextSVG(text, font, size, color, bold, italic, curve) {
  if (!curve || curve === 0) return null;
  const pct = Math.max(1, Math.min(100, Math.abs(curve))) / 100;
  const span = 15 + pct * 155;
  const theta = (span * Math.PI) / 180;
  const charW = size * 0.6;
  const textW = Math.max(text.length * charW, size * 0.8);
  const r = Math.max(textW / (2 * Math.sin(theta / 2)), size * 0.6);
  const sagitta = r * (1 - Math.cos(theta / 2));
  const lineH = size * 1.3;
  const pad = 8;
  const svgW = textW + size * 1.6;
  const svgH = sagitta + lineH + pad * 2;
  const cx = svgW / 2;
  const arcId = 'arc' + item_arc_id++;
  let pathD;
  if (curve > 0) {
    const y = svgH - pad;
    pathD = `M ${cx-textW/2} ${y} A ${r} ${r} 0 0 1 ${cx+textW/2} ${y}`;
  } else {
    const y = pad + lineH * 0.05;
    pathD = `M ${cx-textW/2} ${y} A ${r} ${r} 0 0 0 ${cx+textW/2} ${y}`;
  }
  const fw = bold ? 'bold' : 'normal';
  const fs = italic ? 'italic' : 'normal';
  return `<svg width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg" style="display:block;overflow:visible;flex-shrink:0;pointer-events:none">
    <defs><path id="${arcId}" d="${pathD}" fill="none"/></defs>
    <text font-family="${font}" font-size="${size}" fill="${color}" font-weight="${fw}" font-style="${fs}">
      <textPath href="#${arcId}" startOffset="50%" text-anchor="middle">${escHtml(text)}</textPath>
    </text>
  </svg>`;
}

let item_arc_id = 0;

function createDragItem(item) {
  const el = document.createElement('div');
  el.className = 'drag-item' + (state.selId === item.id ? ' selected' : '');
  el.style.cssText = `left:${item.x}px;top:${item.y}px;position:absolute;cursor:grab;user-select:none;touch-action:none;z-index:${state.selId===item.id?20:10}`;
  el.dataset.id = item.id;

  // Content
  const content = document.createElement('div');
  content.className = 'drag-content';

  if (item.type === 'text') {
    const curve = item.curve || 0;
    if (curve !== 0) {
      const svg = makeCurvedTextSVG(item.text, item.font, item.size, item.color, item.bold, item.italic, curve);
      const hasBg = item.textBg && item.textBg !== 'none';
      if (hasBg) {
        const wrap = document.createElement('div');
        wrap.style.cssText = `background:${item.textBg};border-radius:8px;padding:4px 10px;display:inline-block;line-height:0;pointer-events:none`;
        wrap.innerHTML = svg || '';
        content.appendChild(wrap);
      } else {
        content.innerHTML = svg || '';
      }
    } else {
      const hasBg = item.textBg && item.textBg !== 'none';
      if (hasBg) {
        // Wrap in a bg div that hugs the text, then put text inside
        const bgWrap = document.createElement('div');
        bgWrap.style.cssText = `display:inline-block;background:${item.textBg};border-radius:8px;padding:4px 10px;pointer-events:none`;
        const span = document.createElement('span');
        span.style.cssText = `font-family:${item.font};font-size:${item.size}px;color:${item.color};font-weight:${item.bold?'bold':'normal'};font-style:${item.italic?'italic':'normal'};white-space:nowrap;display:block;letter-spacing:.5px`;
        span.textContent = item.text;
        bgWrap.appendChild(span);
        content.appendChild(bgWrap);
      } else {
        const span = document.createElement('span');
        span.style.cssText = `font-family:${item.font};font-size:${item.size}px;color:${item.color};font-weight:${item.bold?'bold':'normal'};font-style:${item.italic?'italic':'normal'};white-space:nowrap;pointer-events:none;display:block;letter-spacing:.5px`;
        span.textContent = item.text;
        content.appendChild(span);
      }
    }
  } else {
    const img = document.createElement('img');
    img.src = item.src;
    img.style.cssText = `width:${item.size}px;height:auto;pointer-events:none;display:block`;
    content.appendChild(img);
  }

  // Delete btn
  if (state.selId === item.id) {
    const del = document.createElement('button');
    del.className = 'drag-delete';
    del.innerHTML = '✕';
    del.onclick = e => { e.stopPropagation(); deleteItem(item.id); };
    del.addEventListener('mousedown', e => e.stopPropagation());
    del.addEventListener('touchstart', e => e.stopPropagation());
    content.appendChild(del);

    // Toolbar now lives in the sidebar — nothing to add here
  }

  el.appendChild(content);

  // Drag
  let drag = null;
  const startDrag = (cx, cy) => {
    selectItem(item.id);
    const r = document.getElementById('canvas-items').getBoundingClientRect();
    drag = {ox: cx - r.left - item.x, oy: cy - r.top - item.y};
  };
  el.addEventListener('mousedown', e => { e.stopPropagation(); startDrag(e.clientX, e.clientY); });
  el.addEventListener('click', e => e.stopPropagation());
  el.addEventListener('touchstart', e => { e.stopPropagation(); startDrag(e.touches[0].clientX, e.touches[0].clientY); });

  function moveItem(cx, cy) {
    if (!drag || state.selId !== item.id) return;
    const r = document.getElementById('canvas-items')?.getBoundingClientRect();
    if (!r) return;
    // Always grab the live DOM node — el may be stale after renderCanvas()
    const liveEl = document.querySelector(`.drag-item[data-id="${item.id}"]`) || el;
    const elW = liveEl.offsetWidth || 60;
    const elH = liveEl.offsetHeight || 20;
    item.x = Math.max(0, Math.min(r.width - elW, cx - r.left - drag.ox));
    item.y = Math.max(0, Math.min(r.height - elH, cy - r.top - drag.oy));
    liveEl.style.left = item.x + 'px';
    liveEl.style.top  = item.y + 'px';
    if (liveEl._positionToolbar) liveEl._positionToolbar();
  }
  window.addEventListener('mousemove', e => moveItem(e.clientX, e.clientY));
  window.addEventListener('touchmove', e => moveItem(e.touches[0].clientX, e.touches[0].clientY), {passive:true});
  window.addEventListener('mouseup', () => { drag = null; });
  window.addEventListener('touchend', () => { drag = null; });

  return el;
}

function selectItem(id) {
  if (state.selId === id) return;
  state.selId = id;
  // Switch sidebar to text tab so controls are visible
  const item = state.items.find(i => i.id === id);
  if (item) {
    const targetTab = item.type === 'logo' ? 'logo' : 'text';
    state.tab = targetTab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === targetTab));
  }
  renderCanvas();
  renderPanel();
}

function resizeItem(id, dir) {
  const item = state.items.find(i=>i.id===id);
  if (!item) return;
  const isText = item.type==='text';
  item.size = Math.max(isText?8:20, item.size + (isText?2:10)*dir);
  renderCanvas();
  // Update label + slider value without full renderPanel
  const prefix = isText ? 'txt' : 'logo';
  const lbl = document.getElementById(prefix+'-size-lbl-'+id);
  if (lbl) lbl.textContent = 'Size: '+item.size+'px';
  const sliders = document.querySelectorAll('input[type=range]');
  sliders.forEach(s => { if (s.closest('[data-id="'+id+'"]') || (lbl && s.parentElement && s.parentElement.previousElementSibling === lbl.parentElement)) s.value = item.size; });
}

function recolorItem(id, color) {
  const item = state.items.find(i=>i.id===id);
  if (item) { item.color = color; renderCanvas(); }
}

function reshapeItem(id, val) {
  const item = state.items.find(i=>i.id===id);
  if (item) { item.curve = val; renderCanvas(); }
}

function curveItem(id, sign, val) {
  const item = state.items.find(i=>i.id===id);
  if (item) { item.curve = sign * +val; renderCanvas(); }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
document.getElementById('canvas-items').addEventListener('click', () => {
  state.selId = null;
  renderCanvas();
});

// Responsive hint
function updateHintText() {
  const hint = document.getElementById('hint-inner');
  if (hint) hint.innerHTML = window.innerWidth < 700
    ? 'Add text or a logo using the panel on the left'
    : 'Add text or a logo using the panel on the left';
}
window.addEventListener('resize', updateHintText);


// ── PANEL DRAG ────────────────────────────────────────────────────────────────
(function() {
  const MIN_H = 48, MAX_H = window.innerHeight * 0.75;
  let dragging = false, startY = 0, startH = 0;
  function initDrag() {
    const handle = document.getElementById('panel-drag');
    const sidebar = document.getElementById('sidebar');
    if (!handle || !sidebar) return;
    const onStart = (y) => {
      dragging = true;
      startY = y;
      startH = sidebar.offsetHeight;
      document.body.style.userSelect = 'none';
    };
    const onMove = (y) => {
      if (!dragging) return;
      const delta = startY - y;
      const newH = Math.max(MIN_H, Math.min(window.innerHeight * 0.85, startH + delta));
      sidebar.style.height = newH + 'px';
    };
    const onEnd = () => { dragging = false; document.body.style.userSelect = ''; };
    handle.addEventListener('mousedown', e => onStart(e.clientY));
    handle.addEventListener('touchstart', e => onStart(e.touches[0].clientY), {passive:true});
    window.addEventListener('mousemove', e => onMove(e.clientY));
    window.addEventListener('touchmove', e => onMove(e.touches[0].clientY), {passive:true});
    window.addEventListener('mouseup', onEnd);
    window.addEventListener('touchend', onEnd);
  }
  document.addEventListener('DOMContentLoaded', initDrag);
})();

renderCap();
renderPanel();
updateHint();
updateHintText();
setTimeout(applyZoom, 100);
</script>
</body>
