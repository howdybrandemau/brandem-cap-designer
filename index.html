    <div style={{position:"fixed",inset:0,background:"rgba(71,54,11,0.55)",display:"flex",

        boxShadow:"0 -24px 80px rgba(71,54,11,0.25)"}} onClick={e=>e.stopPropagation()}>

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 2px"}}>
          <div>
            <div style={{fontSize:10,color:T.muted,letterSpacing:2,textTransform:"uppercase",fontWeight:600}}>Colour for</div>
            <div style={{fontSize:19,fontWeight:800,color:T.text}}>{target}</div>
          </div>
          <div style={{width:40,height:40,borderRadius:"50%",background:currentHex,flexShrink:0,
            border:`3px solid ${T.accent1}`,boxShadow:"0 2px 10px rgba(0,0,0,0.15)",
            outline:currentHex==="#ffffff"?"1px solid #ccc":"none"}}/>
        </div>
        <input placeholder="Search colours…" value={q} onChange={e=>setQ(e.target.value)} autoFocus

          {list.map(c=>(
            <button key={c.hex+c.name} title={c.name} onClick={()=>{onSelect(c.hex);onClose();}}
              style={{width:"100%",aspectRatio:"1",borderRadius:7,background:c.hex,border:"none",
                cursor:"pointer",transition:"transform 0.12s",
                outline:c.hex===currentHex?`3px solid ${T.accent3}`:"1.5px solid rgba(0,0,0,0.08)",

        <div style={{fontSize:11,color:T.muted,textAlign:"center"}}>{list.length} colours</div>
      </div>
    </div>
  );
}

// ── CURVED TEXT ───────────────────────────────────────────────────────────────
// CurvedText — renders text along a circular arc, tightly contained in its SVG box.
// curve=0 → straight span
// curve 1..100 → arch up (∩), where 100 = tightest arch
// curve -1..-100 → arch down (∪)
function CurvedText({text,font,size,color,bold,italic,curve}) {
  if(!curve||curve===0){
    return(
      <span style={{fontFamily:font,fontSize:size,color,
        fontWeight:bold?"bold":"normal",fontStyle:italic?"italic":"normal",
        whiteSpace:"nowrap",pointerEvents:"none",display:"block",
        textShadow:"0 1px 4px rgba(0,0,0,0.18)",letterSpacing:"0.5px"}}>
        {text}
      </span>
    );
  }
  // Map 1..100 → angular span 15°..170° on the arc
  const pct    = Math.max(1,Math.min(100,Math.abs(curve)))/100;
  const span   = 15 + pct*155;            // degrees the arc subtends
  const theta  = (span*Math.PI)/180;

  // Radius derived so chord length ≈ estimated text width
  const charW  = size*0.6;
  const textW  = Math.max(text.length*charW, size*0.8);
  const r      = Math.max(textW/(2*Math.sin(theta/2)), size*0.6);

  // Sagitta = how far the arc bulges
  const sagitta = r*(1-Math.cos(theta/2));
  const lineH   = size*1.3;
  const pad     = 8;

  // SVG canvas — wide enough for glyphs at the arc ends
  const svgW = textW + size*1.6;
  const svgH = sagitta + lineH + pad*2;

  const cx    = svgW/2;
  const arcId = `arc-${Math.round(span)}-${size}-${text.length}-${curve>0?1:0}`;
  let pathD;
  if(curve>0){
    // arch up: chord near bottom, arc bulges upward
    const y  = svgH - pad;
    const x0 = cx - textW/2;
    const x1 = cx + textW/2;
    pathD = `M ${x0} ${y} A ${r} ${r} 0 0 1 ${x1} ${y}`;
  } else {
    // arch down: chord near top, arc bulges downward
    const y  = pad + lineH*0.05;
    const x0 = cx - textW/2;
    const x1 = cx + textW/2;
    pathD = `M ${x0} ${y} A ${r} ${r} 0 0 0 ${x1} ${y}`;
  }

  return(
    <svg width={svgW} height={svgH} viewBox={`0 0 ${svgW} ${svgH}`}
      xmlns="http://www.w3.org/2000/svg"
      style={{display:"block",pointerEvents:"none",overflow:"visible",flexShrink:0}}>
      <defs><path id={arcId} d={pathD} fill="none"/></defs>
      <text fontFamily={font} fontSize={size} fill={color}
        fontWeight={bold?"bold":"normal"} fontStyle={italic?"italic":"normal"}>
        <textPath href={`#${arcId}`} startOffset="50%" textAnchor="middle">{text}</textPath>
      </text>
    </svg>
  );
}

// ── DRAG ITEM ─────────────────────────────────────────────────────────────────
function DragItem({item,onUpdate,onDelete,onSelect,selected,containerRef}) {
  const drag=useRef(null);
  const startDrag=(cx,cy)=>{
    onSelect();
    const r=containerRef.current.getBoundingClientRect();
    drag.current={ox:cx-r.left-item.x, oy:cy-r.top-item.y};
  };
  useEffect(()=>{
    const mv=e=>{
      if(!drag.current)return;
      const r=containerRef.current?.getBoundingClientRect(); if(!r)return;
      const cx=e.touches?e.touches[0].clientX:e.clientX;
      const cy=e.touches?e.touches[0].clientY:e.clientY;
      onUpdate({x:cx-r.left-drag.current.ox, y:cy-r.top-drag.current.oy});
    };
    const up=()=>{drag.current=null;};
    window.addEventListener("mousemove",mv);
    window.addEventListener("touchmove",mv,{passive:false});
    window.addEventListener("mouseup",up);
    window.addEventListener("touchend",up);
    return()=>{
      window.removeEventListener("mousemove",mv);
      window.removeEventListener("touchmove",mv);
      window.removeEventListener("mouseup",up);
      window.removeEventListener("touchend",up);
    };
  },[onUpdate,containerRef]);

  const curve=item.curve||0;
  const isText=item.type==="text";
  const absCurve=Math.abs(curve);

  return(
    <div onMouseDown={e=>{e.stopPropagation();startDrag(e.clientX,e.clientY);}}
      onTouchStart={e=>{e.stopPropagation();startDrag(e.touches[0].clientX,e.touches[0].clientY);}}
      onClick={e=>e.stopPropagation()}
      style={{position:"absolute",left:item.x,top:item.y,cursor:"grab",
        userSelect:"none",touchAction:"none",zIndex:selected?20:10}}>

      {/* Item content with selection ring */}
      <div style={{position:"relative",
        outline:selected?"2px dashed rgba(247,77,36,0.85)":"2px dashed transparent",
        outlineOffset:3,borderRadius:4,padding:1}}>
        {isText
          ?<CurvedText text={item.text} font={item.font} size={item.size}
              color={item.color} bold={item.bold} italic={item.italic} curve={curve}/>
          :<img src={item.src} alt="" style={{width:item.size,height:"auto",
              pointerEvents:"none",display:"block"}}/>
        }
        {/* Delete button */}
        {selected&&(
          <button onPointerDown={e=>e.stopPropagation()}
            onClick={e=>{e.stopPropagation();onDelete();}}
            style={{position:"absolute",top:-12,right:-12,
              background:"#F74D24",border:"2px solid #fff",color:"#fff",
              borderRadius:"50%",width:22,height:22,fontSize:11,cursor:"pointer",
              fontWeight:"bold",display:"flex",alignItems:"center",
              justifyContent:"center",boxShadow:"0 2px 8px rgba(0,0,0,0.3)",zIndex:30}}>✕</button>
        )}
      </div>

      {/* Floating toolbar below item */}
      {selected&&(
        <div onPointerDown={e=>e.stopPropagation()}
          style={{position:"absolute",bottom:"calc(100% + 10px)",left:"50%",
            transform:"translateX(-50%)",
            display:"flex",alignItems:"center",gap:4,
            background:"rgba(28,22,8,0.93)",backdropFilter:"blur(10px)",
            borderRadius:12,padding:"5px 8px",whiteSpace:"nowrap",
            boxShadow:"0 4px 20px rgba(0,0,0,0.4)",zIndex:30,
            border:"1px solid rgba(255,255,255,0.08)"}}>

          {/* Size */}
          <button onClick={e=>{e.stopPropagation();
              onUpdate({size:Math.max(isText?8:20,(item.size||40)-(isText?2:10));}}
            style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",
              color:"#ccc",cursor:"pointer",fontSize:15,lineHeight:1,
              padding:"3px 7px",borderRadius:6,fontWeight:700}}>−</button>
          <span style={{color:"#FCD68A",fontSize:10,minWidth:30,textAlign:"center",fontWeight:700}}>
            {item.size}px
          </span>
          <button onClick={e=>{e.stopPropagation();
              onUpdate({size:(item.size||40)+(isText?2:10)});}}
            style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",
              color:"#ccc",cursor:"pointer",fontSize:15,lineHeight:1,
              padding:"3px 7px",borderRadius:6,fontWeight:700}}>+</button>

          {isText&&<>
            <div style={{width:1,height:18,background:"rgba(255,255,255,0.12)",margin:"0 1px"}}/>

            {/* Colour dot */}
            <label title="Text colour" style={{
              width:22,height:22,borderRadius:"50%",background:item.color,
              border:"2px solid rgba(255,255,255,0.35)",cursor:"pointer",
              display:"block",overflow:"hidden",position:"relative",flexShrink:0}}>
              <input type="color" value={item.color}
                onChange={e=>{e.stopPropagation();onUpdate({color:e.target.value});}}
                onPointerDown={e=>e.stopPropagation()}
                style={{opacity:0,position:"absolute",inset:0,width:"100%",height:"100%",
                  cursor:"pointer",border:"none",padding:0}}/>
            </label>

            <div style={{width:1,height:18,background:"rgba(255,255,255,0.12)",margin:"0 1px"}}/>

            {/* Shape buttons: None / Arch Up / Arch Down */}
            {[
              {svg:<svg width="22" height="14" viewBox="0 0 22 14"><text x="11" y="11" textAnchor="middle" fontSize="9" fontFamily="Arial" fontWeight="bold" fill="currentColor">ABC</text></svg>, label:"None",   active:curve===0,  val:0},
              {svg:<svg width="22" height="14" viewBox="0 0 22 14"><path d="M2 12 Q11 2 20 12" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/><text x="11" y="10" textAnchor="middle" fontSize="7" fontFamily="Arial" fontWeight="bold" fill="currentColor">ABC</text></svg>, label:"Arch ↑", active:curve>0,    val:absCurve||50},
              {svg:<svg width="22" height="14" viewBox="0 0 22 14"><path d="M2 2 Q11 12 20 2" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/><text x="11" y="7" textAnchor="middle" fontSize="7" fontFamily="Arial" fontWeight="bold" fill="currentColor">ABC</text></svg>, label:"Arch ↓", active:curve<0,   val:-(absCurve||50)},
            ].map(({svg,label,active,val})=>(
              <button key={label} title={label}
                onClick={e=>{e.stopPropagation();onUpdate({curve:val});}}
                style={{
                  background:active?"rgba(192,139,61,0.85)":"rgba(255,255,255,0.06)",
                  border:active?"1px solid rgba(192,139,61,0.6)":"1px solid rgba(255,255,255,0.12)",
                  color:active?"#fff":"#bbb",
                  cursor:"pointer",borderRadius:6,padding:"3px 6px",
                  display:"flex",alignItems:"center",gap:2,
                  transition:"all 0.12s",flexShrink:0}}>{svg}</button>
            ))}

            {/* Curve amount slider — only when curved */}
            {curve!==0&&<>
              <div style={{width:1,height:18,background:"rgba(255,255,255,0.12)",margin:"0 2px"}}/>
              <input type="range" min={1} max={100} value={absCurve}
                onPointerDown={e=>e.stopPropagation()}
                onChange={e=>{e.stopPropagation();
                  const v=+e.target.value;
                  onUpdate({curve:curve>0?v:-v});}}
                style={{width:60,accentColor:"#FCD68A",cursor:"pointer"}}/>
              <span style={{color:"#FCD68A",fontSize:10,fontWeight:700,minWidth:22,textAlign:"right"}}>{absCurve}</span>
            </>}
          </>}
        </div>
      )}
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function CapBuilder() {
  const defaults=Object.fromEntries(CAP_PARTS.map(p=>[p.id,p.default]));
  const [colours,setColours]=useState(defaults);
  const [picker,setPicker]=useState(null);
  const [items,setItems]=useState([]);
  const [selId,setSelId]=useState(null);
  const [tab,setTab]=useState("colours");
  const [newText,setNewText]=useState("YOUR TEXT");
  const [font,setFont]=useState("Arial");
  const [tSize,setTSize]=useState(24);
  const [tColor,setTColor]=useState("#ffffff");
  const [bold,setBold]=useState(false);
  const [italic,setItalic]=useState(false);
  const [tCurve,setTCurve]=useState(0); // 0=none, +deg=arch up, -deg=arch down
  const [form,setForm]=useState({name:"",email:"",phone:"",qty:"",notes:""});
  const [sent,setSent]=useState(false);
  const [mobileDrawer,setMobileDrawer]=useState(false);
  const canvasRef=useRef(null);
  const logoRef=useRef(null);

  // Responsive: detect if narrow screen
  const [isWide,setIsWide]=useState(window.innerWidth>=700);
  useEffect(()=>{
    const handler=()=>setIsWide(window.innerWidth>=700);
    window.addEventListener("resize",handler);
    return()=>window.removeEventListener("resize",handler);
  },[]);

  const cssVars=Object.fromEntries(CAP_PARTS.map(p=>[p.cssVar,colours[p.id]]));
  const colourName=id=>COLOURS.find(c=>c.hex.toLowerCase()===colours[id]?.toLowerCase())?.name||colours[id];

  const addText=()=>{
    if(!newText.trim())return;
    // Smart placement: stack items vertically
    const existingText=items.filter(i=>i.type==="text");
    const yPos=existingText.length>0?60+existingText.length*40:55;
    setItems(p=>[...p,{id:Date.now(),type:"text",text:newText,font,size:tSize,
      color:tColor,bold,italic,curve:tCurve,x:60,y:yPos}]);
    setNewText("");
  };
  const handleLogo=e=>{
    const f=e.target.files[0]; if(!f)return;
    const r=new FileReader();
    r.onload=ev=>setItems(p=>[...p,{id:Date.now(),type:"logo",src:ev.target.result,x:80,y:50,size:70}]);
    r.readAsDataURL(f); e.target.value="";
  };
  const submit=()=>{
    const cl=CAP_PARTS.map(p=>`${p.label}: ${colourName(p.id)} (${colours[p.id]})`).join("\n");
    const tl=items.filter(i=>i.type==="text").map(i=>`"${i.text}" | ${i.font} | ${i.size}px | ${i.color}`).join("\n")||"None";
    const body=`CAP DESIGN ORDER\n================\nName: ${form.name}\nEmail: ${form.email}\nPhone: ${form.phone||"—"}\nQty: ${form.qty||"—"}\nNotes: ${form.notes||"—"}\n\nCOLOURS:\n${cl}\n\nTEXT:\n${tl}\n\nLOGOS: ${items.filter(i=>i.type==="logo").length}`;
    window.open(`mailto:hello@brandemau.com?subject=Cap Design - ${form.name}&body=${encodeURIComponent(body)}`);
    setSent(true);
  };

  const TABS=[
    {id:"colours",label:"Colours",icon:"🎨"},
    {id:"text",   label:"Text",   icon:"✏️"},
    {id:"logo",   label:"Logo",   icon:"🖼️"},
    {id:"order",  label:"Order",  icon:"📋"},
  ];

  // Clamp item position within canvas bounds when dragging
  const clampItem=(item,u,canvasW,canvasH)=>{
    const nx=u.x!==undefined?u.x:item.x;
    const ny=u.y!==undefined?u.y:item.y;
    const pad=4;
    return {...u,
      x:Math.max(pad,Math.min(canvasW-(item.size||60)-pad,nx)),
      y:Math.max(pad,Math.min(canvasH-(item.size||20)-pad,ny))
    };
  };

  return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",background:T.bg,
      color:T.text,fontFamily:"'DM Sans','Segoe UI',system-ui,sans-serif",overflow:"hidden"}}>

      {/* ── HEADER ── */}
      <div style={{background:T.bg,borderBottom:`1.5px solid ${T.border}`,
        padding:"8px 20px",display:"flex",alignItems:"center",gap:12,flexShrink:0,zIndex:50,
        boxShadow:"0 1px 12px rgba(71,54,11,0.08)"}}>
        <img src={LOGO_URI} alt="Brand 'Em Outfitters" style={{width:44,height:44,objectFit:"contain",flexShrink:0}}/>
        <div style={{display:"flex",flexDirection:"column",justifyContent:"center"}}>
          <div style={{fontFamily:"'Black Han Sans',sans-serif",fontSize:16,color:T.text,
            letterSpacing:"0.5px",lineHeight:1,textTransform:"uppercase"}}>BRANDEMAU.COM</div>
          <div style={{fontFamily:"'Black Han Sans',sans-serif",fontSize:11,color:T.muted,
            letterSpacing:"1px",lineHeight:1.5,textTransform:"uppercase"}}>Cap Designer</div>
        </div>
        <div style={{marginLeft:"auto",display:"flex",gap:8,alignItems:"center"}}>
          <div style={{fontSize:12,color:T.muted}}>
            {items.length>0&&`${items.filter(i=>i.type==="text").length} text · ${items.filter(i=>i.type==="logo").length} logo`}
          </div>
          <button onClick={()=>setTab("order")}
            style={{background:T.accent3,borderRadius:8,padding:"8px 20px",
              fontSize:12,fontWeight:700,color:"#fff",border:"none",cursor:"pointer",

                      <div key={fi.k}>
                        <div style={{fontSize:10,color:T.muted,marginBottom:3,fontWeight:600}}>{fi.label}</div>
                        <input type={fi.type} placeholder={fi.ph} value={form[fi.k]}
                          onChange={e=>setForm(p=>({...p,[fi.k]:e.target.value}))}
                          style={{width:"100%",background:"#fff",border:`1.5px solid ${T.border}`,
                            borderRadius:8,padding:"8px 10px",color:T.text,fontSize:13,
                            outline:"none",boxSizing:"border-box",fontFamily:"inherit"}}
                          onFocus={e=>e.target.style.borderColor=T.accent1}
                          onBlur={e=>e.target.style.borderColor=T.border}/>
                      </div>
                    ))}
                    <textarea placeholder="Notes / deadline / requirements…" value={form.notes}
                      onChange={e=>setForm(p=>({...p,notes:e.target.value}))} rows={3}
                      style={{width:"100%",background:"#fff",border:`1.5px solid ${T.border}`,
                        borderRadius:8,padding:"8px 10px",color:T.text,fontSize:13,
                        outline:"none",resize:"vertical",boxSizing:"border-box",fontFamily:"inherit"}}
                      onFocus={e=>e.target.style.borderColor=T.accent1}
                      onBlur={e=>e.target.style.borderColor=T.border}/>
                    <button onClick={submit} disabled={!form.name||!form.email}
                      style={{padding:"11px",border:"none",borderRadius:8,fontWeight:800,fontSize:13,
                        cursor:form.name&&form.email?"pointer":"not-allowed",
                        background:form.name&&form.email?T.accent3:T.surface2,
                        color:form.name&&form.email?"#fff":T.muted,
                        boxShadow:form.name&&form.email?`0 4px 14px ${T.accent3}55`:"none",
                        transition:"all 0.2s"}}>
                      🚀 Submit My Design
                    </button>
                    <div style={{fontSize:10,color:T.muted,textAlign:"center"}}>We reply within 24 hours</div>
                  </>
                )}
              </>
            )}
          </div>
        </div>

        {/* CANVAS — top on mobile, right on desktop */}
        <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",
          background:"#E8E6DC",overflow:"hidden",position:"relative",
          order:isWide?1:-1}}>
          {/* subtle grid bg */}
          <div style={{position:"absolute",inset:0,
            backgroundImage:"radial-gradient(circle,rgba(71,54,11,0.08) 1px,transparent 1px)",
            backgroundSize:"24px 24px",pointerEvents:"none"}}/>

          {/* The whiteboard */}
          <div style={{position:"relative",background:"#fff",borderRadius:isWide?16:10,
            boxShadow:"0 8px 48px rgba(71,54,11,0.18), 0 2px 12px rgba(71,54,11,0.10)",
            overflow:"hidden",
            width:isWide?"min(720px,90vw)":"min(560px,96vw)",aspectRatio:"2/1"}}>

            <div ref={canvasRef}
              style={{position:"absolute",inset:0,...cssVars}}
              onClick={()=>setSelId(null)}>
              <svg viewBox="10 50 260 130"
                style={{width:"100%",height:"100%",display:"block"}}
                xmlns="http://www.w3.org/2000/svg" xmlnsXlink="http://www.w3.org/1999/xlink">
                <defs dangerouslySetInnerHTML={{__html:DEFS}}/>
                <g dangerouslySetInnerHTML={{__html:CAP_SVG}}/>
              </svg>
              {items.map(item=>(
                <DragItem key={item.id} item={item} containerRef={canvasRef}
                  selected={selId===item.id} onSelect={()=>setSelId(item.id)}
                  onUpdate={u=>{
                    const el=canvasRef.current;
                    const clamped=el&&(u.x!==undefined||u.y!==undefined)
                      ?clampItem(item,u,el.offsetWidth,el.offsetHeight)
                      :u;
                    setItems(p=>p.map(i=>i.id===item.id?{...i,...clamped}:i));
                  }}
                  onDelete={()=>setItems(p=>p.filter(i=>i.id!==item.id))}/>
              ))}
            </div>

            {/* hint overlay when empty */}
            {items.length===0&&(
              <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",
                justifyContent:"center",pointerEvents:"none"}}>
                <div style={{background:"rgba(255,255,255,0.85)",borderRadius:10,padding:"10px 18px",
                  fontSize:12,color:T.muted,border:`1px dashed ${T.border}`,backdropFilter:"blur(4px)"}}>
                  {isWide?"Add text or a logo using the panel on the left":"Add text or a logo using the panel below"}
                </div>
              </div>
            )}
          </div>
        </div>
      </div>

      {picker&&(
        <ColourPicker target={picker.label} currentHex={colours[picker.id]}
          onSelect={hex=>setColours(p=>({...p,[picker.id]:hex}))}
          onClose={()=>setPicker(null)}/>
      )}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<CapBuilder/>);
</script>
</body>
</html>
